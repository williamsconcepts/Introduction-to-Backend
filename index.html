<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Todo</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <main>
      <header>
        <h1>My Todo</h1>

        <div class="search-area">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search tasks..." />
          </div>

          <select>
            <option>All</option>
            <option>Work</option>
            <option>Personal</option>
            <option>Study</option>
          </select>
        </div>
      </header>

      <section class="task-form">
        <input id="taskItem" type="text" placeholder="What needs to be done?" />

        <button id="addBtn" onclick="createItems()">Add Task</button>
      </section>

      <section class="task-controls">
        <div class="tabs">
          <a href="#" class="active">All Tasks</a>
          <a href="#">Active</a>
          <a href="#">Completed</a>
        </div>

        <div class="sort">
          Sort by: Created (Newest)
          <i class="fa-solid fa-chevron-down"></i>
        </div>
      </section>

      <table id="todo">
        <thead>
          <tr>
            <th>
              <input type="checkbox" />
            </th>

            <th>Task</th>
            <th>List</th>
            <th>Due Date</th>
            <th>Created</th>
            <th>Starred</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
        </tbody>
      </table>

      <footer>
        <p>2 of 6 tasks completed</p>

        <a href="#">Clear completed</a>
      </footer>
    </main>


<!-- 
=====================================
============ DOM Manipulation =======
=====================================
-->

<script>

let todos = [
    {
    id: 1,
    task: "Laundary",
    list: "Personal",
    dueDate: "2026-06-16",
    created: "2026-06-16 00:00",
    starred: false,
    },
     {
    id: 2,
    task: "Macbook Pro",
    list: "Study",
    dueDate: "2026-04-16",
    created: "2026-06-16 00:00",
    starred: false,
    },
     {
    id: 3,
    task: "Bag Pack",
    list: "Personal",
    dueDate: "2026-06-18",
    created: "2026-06-16 00:00",
    starred: false,
    }
];

const todo = document.querySelector("#todo tbody");


function createItems() {
    const task= document.querySelector("#taskItem")?.value.trim();

    if (!task) {
        return;
    }

    const tr = document.createElement("tr");
    tr.innerHTML = `
                <td>
                <input type="checkbox">
                </td>

                    <td>${task}</td>

                    <td>
                        <span class="badge work">
                            ● Work
                        </span>
                    </td>

                    <td class="danger">
                        <i class="fa-regular fa-calendar"></i>
                        2026-04-03
                    </td>

                    <td>2026-04-03</td>

                    <td>
                        <i class="fa-regular fa-star"></i>

                    </td>

                    <td>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </td>
        `;
        todo.appendChild(tr);

   
}

function editItems() {
    
}

function updateItems() {
    
}

function deleteItems() {
    
}


// Loading Items

function loadItems() {
    todos.forEach(function (items) {
    const tr = document.createElement("tr");

        tr.innerHTML = `
                <td>
                <input type="checkbox">
                </td>

                    <td>${items.task}</td>

                    <td>
                        <span class="badge work">
                            ● ${items.list}
                        </span>
                    </td>

                    <td class="danger">
                        <i class="fa-regular fa-calendar"></i>
                        ${items.dueDate}
                    </td>

                    <td>${items.created}</td>

                    <td>
                        <i class="fa-regular fa-star"></i>

                    </td>

                    <td>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </td>
        `;
        todo.appendChild(tr);
    });
}

loadItems();

    </script>
  </body>
</html>
